services:
  culab:
    build: 
      context: .
      args:
        - USER=${USER}
        - UID=${UID}
        - GID=${GID}
    container_name: culab
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${ARCANE}/culab/workspace:/workspace
      - /home/${USER}/.gitconfig:/home/${USER}/.gitconfig:ro
      - /home/${USER}/.ssh:/home/${USER}/.ssh:ro
    ports:
      - "8888:8888"
    networks:
      - lilith_default
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


networks:
  lilith_default:
    name: lilith_default
    external: true
