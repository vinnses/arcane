# Para reativar: copie este bloco para lilith/nginx/nginx.conf
# e certifique-se que o serviço 'culab' está na rede lilith_default.

server {
    listen 80;
    server_name culab.lilith.hell;

    access_log /var/log/nginx/culab_access.log;
    error_log  /var/log/nginx/culab_error.log;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "culab:8888";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
