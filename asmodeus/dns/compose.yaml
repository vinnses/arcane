name: taildns

services:
  taildns:
    image: tailscale/tailscale:latest
    container_name: taildns
    hostname: taildns
    cap_add:
      - net_admin
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    volumes:
      - ts-dns-state:/var/lib/tailscale
      - dns-data:/data
      - ${ARCANE}/dns/generate-config.sh:/usr/local/bin/generate-config.sh:ro
    command: >
      sh -c "
        /usr/local/bin/containerboot &
        until tailscale status > /dev/null 2>&1; do sleep 1; done;
        generate-config.sh;
        wait
      "
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  dnsmasq:
    image: alpine:3.20
    container_name: dnsmasq
    network_mode: "service:taildns"
    depends_on:
      taildns:
        condition: service_healthy
    volumes:
      - ${ARCANE}/dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - dns-data:/etc/dnsmasq.d/generated/:ro
      - /run/NetworkManager/resolv.conf:/upstream/nm-resolv.conf:ro
    command: >
      sh -c "apk add --no-cache dnsmasq && dnsmasq --keep-in-foreground"
    restart: unless-stopped

volumes:
  ts-dns-state:
  dns-data:
