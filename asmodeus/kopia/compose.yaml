services:
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    env_file:
      - .env
    volumes:
      - ${ARCANE}/kopia/entrypoint.sh:/app/entrypoint.sh:ro
      - ${ARCANE}/kopia/sources.conf:/app/sources.conf:ro
      - ${ARCANE}/kopia/.data/repo:/app/repository
      - ${ARCANE}/kopia/.data/config:/app/config
      - ${ARCANE}/kopia/.data/cache:/app/cache
      - ${ARCANE}/kopia/.data/logs:/app/logs
      # === Sources (add new backup sources here) ===
      - ${VAULT_PATH}:/app/sources/obsidian:ro
      - ${ARCANE}/webdav/.data/zotero:/app/sources/zotero:ro
    networks:
      - asmodeus_default

networks:
  asmodeus_default:
    name: asmodeus_default
    external: true
