# Kopia backup sources — one per line
# Format: path|interval|keep-latest|keep-hourly|keep-daily|keep-weekly|keep-monthly|keep-annual|compression
#
# path         = mount path inside the container (under /app/sources/)
# interval     = snapshot frequency (e.g., 1m, 1h, 24h)
# keep-latest  = number of most recent snapshots to keep regardless of age
# keep-hourly  = keep 1 snapshot per hour for this many hours
# keep-daily   = keep 1 snapshot per day for this many days
# keep-weekly  = keep 1 snapshot per week for this many weeks
# keep-monthly = keep 1 snapshot per month for this many months
# keep-annual  = keep 1 snapshot per year for this many years
# compression  = algorithm (zstd, gzip, none)
#
# Retention layers funnel down over time:
#   keep-latest gives you full resolution for the most recent snapshots
#   keep-hourly collapses to 1/hour after keep-latest is exceeded
#   keep-daily collapses to 1/day after keep-hourly window passes
#   ...and so on down to keep-annual
#
# Example: obsidian with 1-min snapshots
#   keep-latest=120 → last ~2 hours at 1-min resolution
#   keep-hourly=48  → 2 days at hourly resolution
#   keep-daily=14   → 2 weeks at daily resolution
#   keep-weekly=8   → 2 months at weekly resolution
#   keep-monthly=6  → 6 months
#   keep-annual=2   → 2 years
/app/sources/obsidian|1m|120|48|14|8|6|2|zstd
/app/sources/zotero|1h|24|48|14|8|6|2|zstd
