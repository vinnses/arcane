services:
  nginx:
    image: nginx:alpine
    container_name: asmodeus-nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ${ARCANE}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${ARCANE}/nginx/logs:/var/log/nginx
      - ${ARCANE}/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - asmodeus_default

networks:
  asmodeus_default:
    name: asmodeus_default
    external: true
