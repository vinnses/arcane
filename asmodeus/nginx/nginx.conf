# Docker's internal resolver with IPv6 disabled to eliminate AAAA timeout loops.
# Placed at http-context scope (this file is included inside nginx's http {} block).
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name arcane.asmodeus.hell;

    access_log /var/log/nginx/arcane_access.log;
    error_log  /var/log/nginx/arcane_error.log;

    location / {
        set $upstream http://arcane:3552;

        include snippets/proxy_params.conf;
        proxy_pass $upstream;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

server {
    listen 80;
    server_name kopia.asmodeus.hell;

    access_log /var/log/nginx/kopia_access.log;
    error_log  /var/log/nginx/kopia_error.log;

    location / {
        set $upstream http://kopia:51515;

        include snippets/proxy_params.conf;
        proxy_pass $upstream;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

server {
    listen 80;
    server_name sync.asmodeus.hell syncthing.asmodeus.hell;

    access_log /var/log/nginx/syncthing_access.log;
    error_log  /var/log/nginx/syncthing_error.log;

    location / {
        set $upstream http://syncthing:8384;

        include snippets/proxy_params.conf;
        proxy_pass $upstream;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

server {
    listen 80;
    server_name webdav.asmodeus.hell webdav.asmodeus.local;

    access_log /var/log/nginx/webdav_access.log;
    error_log  /var/log/nginx/webdav_error.log;

    location = /zotero {
        return 301 /zotero/;
    }

    location /zotero/ {
        set $upstream http://webdav:80;

        include snippets/proxy_params_webdav.conf;
        proxy_pass $upstream;
    }

    location / {
        return 301 /zotero/;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

server {
    listen 80;
    server_name latex.asmodeus.hell overleaf.asmodeus.hell;

    access_log /var/log/nginx/overleaf_access.log;
    error_log  /var/log/nginx/overleaf_error.log;

    client_max_body_size 200M;

    location / {
        set $upstream http://sharelatex:80;

        include snippets/proxy_params.conf;
        proxy_pass $upstream;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

# Fallback routes for direct IP/localhost access when DNS is unavailable.
server {
    listen 80 default_server;

    access_log /var/log/nginx/default_access.log;
    error_log  /var/log/nginx/default_error.log;

    location /arcane/ {
        set $upstream http://arcane:3552;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /kopia/ {
        set $upstream http://kopia:51515;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /sync/ {
        set $upstream http://syncthing:8384;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /zotero/ {
        set $upstream http://webdav:80;

        include snippets/proxy_params_webdav.conf;
        proxy_pass $upstream;
    }

    location /overleaf/ {
        set $upstream http://sharelatex:80;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    location / {
        return 404;
    }
}
