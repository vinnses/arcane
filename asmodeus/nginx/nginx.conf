server {
    listen 80 default_server;

    return 404;
}

server {
    listen 80;
    server_name arcane.asmodeus.hell arcane.asmodeus.local;

    access_log /var/log/nginx/arcane_access.log;
    error_log  /var/log/nginx/arcane_error.log;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "arcane:3552";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

server {
    listen 80;
    server_name kopia.asmodeus.hell kopia.asmodeus.local;

