server {
    listen 80;
    server_name zotero.asmodeus.hell zotero.asmodeus.local;

    access_log /var/log/nginx/zotero_access.log;
    error_log  /var/log/nginx/zotero_error.log;

    # Navegador normalmente faz GET na página inicial e pode funcionar mesmo com
    # endpoint WebDAV incorreto. O app Zotero usa PROPFIND/OPTIONS/MKCOL/PUT/DELETE
    # e valida a URL base do WebDAV com mais rigidez.
    #
    # Aceitamos tanto URL na raiz (recomendado) quanto legado em /zotero/ para evitar
    # erro em clientes ainda apontando para o subpath antigo.

    location = /zotero {
        return 301 /;
    }

    location /zotero/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "zotero:80";

        include snippets/proxy_params_webdav.conf;
        rewrite ^/zotero/?(.*)$ /$1 break;
        proxy_pass http://$backend_service/;
    }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "zotero:80";

        include snippets/proxy_params_webdav.conf;
        proxy_pass http://$backend_service/;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

# Fallback routes for direct IP/localhost access when DNS is unavailable.
server {
    listen 80;
    server_name _;

    location /kopia/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "kopia:51515";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }

    location /sync/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "syncthing:8384";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }

    location /zotero/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "zotero:80";

        include snippets/proxy_params_webdav.conf;
        proxy_pass http://$backend_service/;
    }

    location /arcane/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "arcane:3552";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }
}
