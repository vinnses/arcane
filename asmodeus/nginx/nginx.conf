# asmodeus nginx — reverse proxy for internal services
# Subdomain-based blocks activate when .hell DNS is live.
# Location-based fallback block works via direct IP/hostname at all times.

# ── Subdomain blocks (active when .hell DNS resolves) ──────────────────────

server {
    listen 80;
    server_name kopia.asmodeus.hell;

    location / {
        proxy_pass http://kopia:51515;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name sync.asmodeus.hell;

    location / {
        proxy_pass http://syncthing:8384;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name webdav.asmodeus.hell;

    location /zotero/ {
        proxy_pass http://zotero-webdav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Destination $http_destination;
        proxy_pass_request_headers on;
        client_max_body_size 512M;
    }
}

# ── Location-based fallback (works via direct IP/hostname) ─────────────────

server {
    listen 80;
    server_name _;

    location /kopia/ {
        proxy_pass http://kopia:51515/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sync/ {
        proxy_pass http://syncthing:8384/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /zotero/ {
        proxy_pass http://zotero-webdav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Destination $http_destination;
        proxy_pass_request_headers on;
        client_max_body_size 512M;
    }
}
