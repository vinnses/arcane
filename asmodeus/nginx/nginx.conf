server {
    listen 80;
    server_name sync.asmodeus.hell syncthing.asmodeus.hell sync.asmodeus.local syncthing.asmodeus.local;

    access_log /var/log/nginx/syncthing_access.log;
    error_log  /var/log/nginx/syncthing_error.log;

    location / {
        resolver 127.0.0.11 valid=10s;
