services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    hostname: asmodeus-syncthing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VAULT_PATH}:/var/syncthing/vault
      - ${ARCANE}/syncthing/.data:/var/syncthing/config
    networks:
      - proxy_net

networks:
  proxy_net:
    name: proxy_net
    external: true
