# Choronzon dnsmasq — containerized DNS for .hell domain

# bind-dynamic: tolerates tailscale0 appearing after start
bind-dynamic

# Do not read /etc/resolv.conf inside container
no-resolv

# Drop-in configs from shared volume (generated by taildns on startup)
conf-dir=/etc/dnsmasq.d/generated/,*.conf

# Cache
cache-size=1000

# Don't forward plain hostnames or non-routed addresses
domain-needed
bogus-priv

# Never forward .hell queries to upstream resolvers — this server is authoritative
local=/hell/

# Return NXDOMAIN for all AAAA queries (containers are IPv4-only; eliminates timeout loops)
filter-AAAA
