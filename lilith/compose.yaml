services:
  arcane:
    image: ghcr.io/ofkm/arcane:latest
    container_name: arcane
    expose:
      - '3552'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ARCANE}/.data:/app/data
      - ${ARCANE}:/app/data/projects
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy_net

networks:
  proxy_net:
    name: proxy_net
    external: true
