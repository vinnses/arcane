services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ${ARCANE}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${ARCANE}/nginx/logs:/var/log/nginx
      - ${ARCANE}/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - proxy_net

networks:
  proxy_net:
    name: proxy_net
    driver: bridge
