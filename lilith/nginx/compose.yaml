services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ARCANE_DIR}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ${ARCANE_DIR}/nginx/logs:/var/log/nginx
    networks:
      - lilith_default
    restart: unless-stopped

networks:
  lilith_default:
    name: lilith_default
    external: true
