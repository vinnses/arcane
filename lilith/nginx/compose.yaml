services:
  nginx:
    image: nginx:alpine
    container_name: lilith-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ARCANE}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ${ARCANE}/nginx/logs:/var/log/nginx
      - ${ARCANE}/nginx/www:/var/www
      - ${ARCANE}/nginx/snippets:/etc/nginx/snippets
    networks:
      - lilith_default
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  lilith_default:
    name: lilith_default
    external: true
