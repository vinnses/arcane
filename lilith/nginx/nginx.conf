# Fallback routes for direct IP/localhost access when DNS is unavailable.
server {
    listen 80 default_server;

    access_log /var/log/nginx/default_access.log;
    error_log  /var/log/nginx/default_error.log;

    location /arcane/ {
        set $upstream http://arcane:3552;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /btop/ {
        set $upstream http://cuda-btop:8686;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /immich/ {
        set $upstream http://immich-server:2283;

        include snippets/proxy_params_immich.conf;
        proxy_pass $upstream/;
    }

    location /sync/ {
        set $upstream http://syncthing:8384;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /ollama/ {
        set $upstream http://ollama:11434;

        include snippets/proxy_params_immich.conf;
        proxy_pass $upstream/;
    }

    location /jupyter/ {
        set $upstream http://cuda-jupyter:8888;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /code/ {
        set $upstream http://cuda-code-server:8443;

        include snippets/proxy_params.conf;
        proxy_pass $upstream/;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    location / {
        return 404;
    }
}
