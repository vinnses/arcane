server {
    listen 80;
    server_name _;

    location /arcane/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "arcane:3552";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }

    location /btop/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "btop:8686";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }

    location /immich/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "immich-server:2283";

        include snippets/proxy_params_immich.conf;
        proxy_pass http://$backend_service/;
    }

    location /sync/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "syncthing:8384";

        include snippets/proxy_params.conf;
        proxy_pass http://$backend_service/;
    }

    location /ollama/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_service "ollama:11434";

        include snippets/proxy_params_immich.conf;
        proxy_pass http://$backend_service/;
    }
}
