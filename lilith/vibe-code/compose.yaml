services:
  vibe-code:
    image: node:20-bookworm
    container_name: vibe-code
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/opt/vibe-code/vibe-init.sh"]
    working_dir: /projects

    volumes:
      # Init script — read-only
      - ${ARCANE}/vibe-code/vibe-init.sh:/opt/vibe-code/vibe-init.sh:ro

      # Project data — read-write
      - ${VIBE_DATA_PATH}:/projects/ClaudeData

      # Claude credentials — read-only (re-auth manual on token expiry)
      - ${HOME}/.claude:/home/claude/.claude:ro

      # Claude user config — read-only
      - ${HOME}/.claude.json:/home/claude/.claude.json:ro

      # Session persistence across container recreations
      - sessions:/home/claude/.sessions

    environment:
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - VIBE_PORT=${VIBE_PORT:-7681}
      - VIBE_USER=${VIBE_USER:-}
      - VIBE_PASSWORD=${VIBE_PASSWORD:-}

    networks:
      - lilith_default

volumes:
  sessions:

networks:
  lilith_default:
    name: lilith_default
    external: true
