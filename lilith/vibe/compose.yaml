services:
  code:
    image: node:20-bookworm
    container_name: ${VIBE_CONTAINER:-vibe}
    hostname: ${VIBE_HOSTNAME:-vibe}
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["bash", "-c", "set -e; for s in ~/init.d/*.sh; do bash \"$$s\"; done; echo '>>> [vibe] Ready.'; exec sleep infinity"]
    working_dir: /home/${VIBE_USER:-vibecoder}/projects
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-write (agents can generate new ones)
      - ${ARCANE}/vibe/init.d:/home/${VIBE_USER:-vibecoder}/init.d

      # Dotfiles — mapped directly into home, editable
      - ${ARCANE}/vibe/dotfiles/.bashrc:/home/${VIBE_USER:-vibecoder}/.bashrc
      - ${ARCANE}/vibe/dotfiles/.bashrc.d:/home/${VIBE_USER:-vibecoder}/.bashrc.d
      - ${ARCANE}/vibe/dotfiles/.gitconfig:/home/${VIBE_USER:-vibecoder}/.gitconfig

      # Skills — versionado com arcane
      - ${ARCANE}/vibe/skills:/home/${VIBE_USER:-vibecoder}/skills

      # Projects — host bind mount
      - ${VIBE_CODE_PATH}:/home/${VIBE_USER:-vibecoder}/projects

      # Agent configs (.claude/, etc.) — persists outside named volume
      - ${ARCANE}/vibe/.data/agents:/home/${VIBE_USER:-vibecoder}/.agents

      # SSH keys — persists outside named volume
      - ${ARCANE}/vibe/.data/ssh:/home/${VIBE_USER:-vibecoder}/.ssh

      # Persistent home (catch-all for everything else)
      - vibe-home:/home/${VIBE_USER:-vibecoder}

    environment:
      - VIBE_USER=${VIBE_USER:-vibecoder}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    ports:
      - "${VIBE_SSH_PORT:-2222}:22"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - lilith_default

volumes:
  vibe-home:

networks:
  lilith_default:
    name: lilith_default
    external: true
