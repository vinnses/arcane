services:
  code:
    image: node:20-bookworm
    container_name: ${VIBE_CONTAINER:-vibe}
    hostname: ${VIBE_HOSTNAME:-vibe}
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["bash", "-c", "set -e; for s in /opt/vibe/init.d/*.sh; do bash \"$$s\"; done; echo '>>> [vibe] Ready.'; exec sleep infinity"]
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-only
      - ${ARCANE}/vibe/init.d:/opt/vibe/init.d:ro

      # User configs (bashrc, gitconfig, authorized_keys) — read-only
      - ${ARCANE}/vibe/data/user:/opt/vibe/user:ro

      # Workspace — host bind mount for projects
      - ${VIBE_CODE_PATH}:/codes

      # Persistent home — tool configs survive container recreations
      - vibe-home:/home/${VIBE_USER:-vibecoder}

    environment:
      - VIBE_USER=${VIBE_USER:-vibecoder}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    ports:
      - "${VIBE_SSH_PORT:-2222}:22"

    networks:
      - lilith_default

volumes:
  vibe-home:

networks:
  lilith_default:
    name: lilith_default
    external: true
