services:
  code:
    image: node:20-bookworm
    container_name: vibe
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["/opt/vibe/vibe-init.sh"]
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-only
      - ${ARCANE}/vibe/vibe-init.sh:/opt/vibe/vibe-init.sh:ro
      - ${ARCANE}/vibe/init.d:/opt/vibe/init.d:ro

      # Workspace — host bind mount for projects
      - ${VIBE_CODE_PATH}:/vibe/code

      # Persistent home — survives container recreations
      # Tool configs (e.g. ~/.claude, ~/.gemini) live here
      - vibe-home:/vibe/home

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    networks:
      - lilith_default

volumes:
  vibe-home:

networks:
  lilith_default:
    name: lilith_default
    external: true
