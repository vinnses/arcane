services:
  vibecode:
    image: node:20-bookworm
    container_name: ${CONTAINER:-vibe}
    hostname: ${HOSTNAME:-vibe}
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["bash", "-c", "set -e; for s in ~/init.d/*.sh; do bash \"$$s\"; done; echo '>>> [vibe] Ready.'; exec sleep infinity"]
    working_dir: /home/${USER:-vibecoder}/projects
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-write (agents can generate new ones)
      - ${ARCANE}/vibecode/init.d:/home/${USER:-vibecoder}/init.d

      # Dotfiles — mapped directly into home, editable
      - ${ARCANE}/vibecode/dotfiles/.bashrc:/home/${USER:-vibecoder}/.bashrc
      - ${ARCANE}/vibecode/dotfiles/.bashrc.d:/home/${USER:-vibecoder}/.bashrc.d
      - ${ARCANE}/vibecode/dotfiles/.gitconfig:/home/${USER:-vibecoder}/.gitconfig

      # Skills — versionado com arcane
      - ${ARCANE}/vibecode/skills:/home/${USER:-vibecoder}/skills

      # Projects — host bind mount
      - ${PROJECT_PATH}:/home/${USER:-vibecoder}/projects

      # Agent configs (.claude/, etc.) — persists outside named volume
      - ${ARCANE}/vibecode/.data/agents:/home/${USER:-vibecoder}/.agents

      # SSH keys — persists outside named volume
      - ${ARCANE}/vibecode/.data/ssh:/home/${USER:-vibecoder}/.ssh

      # Persistent home (catch-all for everything else)
      - vibehome:/home/${USER:-vibecoder}

    environment:
      - USER=${USER:-vibecoder}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    ports:
      - "${SSH_PORT:-2222}:22"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - lilith_default

volumes:
  vibehome:

networks:
  lilith_default:
    name: lilith_default
    external: true
