services:
  vibecode:
    build:
      context: .
      args:
        VIBE_USER: ${VIBE_USER:-vibecoder}
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    #container_name: vibing
    hostname: vibration
    restart: unless-stopped
    env_file:
      - .env
    #entrypoint: ["bash", "-c", "set -e; for s in ~/init.d/*.sh; do bash \"$$s\"; done; echo '>>> [vibe] Ready.'; exec sleep infinity"]
    entrypoint: ["sleep", "infinity"]
    working_dir: /home/${VIBE_USER:-vibecoder}/projects
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-write (agents can generate new ones)
      - ${ARCANE}/vibespace/init.d:/home/${VIBE_USER:-vibecoder}/init.d

      # Dotfiles — mapped directly into home, editable
      - ${ARCANE}/vibespace/dotfiles/.bashrc:/home/${VIBE_USER:-vibecoder}/.bashrc
      - ${ARCANE}/vibespace/dotfiles/.bashrc.d:/home/${VIBE_USER:-vibecoder}/.bashrc.d
      - ${ARCANE}/vibespace/dotfiles/.gitconfig:/home/${VIBE_USER:-vibecoder}/.gitconfig

      # Skills — versionado com arcane
      - ${ARCANE}/vibespace/skills:/home/${VIBE_USER:-vibecoder}/skills

      # Projects — host bind mount
      - ${PROJECT_PATH}:/home/${VIBE_USER:-vibecoder}/projects

      # Agent configs (.claude/, etc.) — persists outside named volume
      - ${ARCANE}/vibespace/.data/agents:/home/${VIBE_USER:-vibecoder}/.agents

      # SSH keys — persists outside named volume
      - ${ARCANE}/vibespace/.data/ssh:/home/${VIBE_USER:-vibecoder}/.ssh

      # Persistent home (catch-all for everything else)
      - vibestorage:/home/${VIBE_USER:-vibecoder}

    ports:
      - "${SSH_PORT:-2222}:22"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - lilith_default

volumes:
  vibestorage:

networks:
  lilith_default:
    name: lilith_default
    external: true
