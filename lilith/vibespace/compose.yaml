services:
  vibecode:
    image: node:20-bookworm
    user: "node"
    #container_name: vibing
    hostname: vibration
    restart: unless-stopped
    env_file:
      - .env
    #entrypoint: ["bash", "-c", "set -e; for s in ~/init.d/*.sh; do bash \"$$s\"; done; echo '>>> [vibe] Ready.'; exec sleep infinity"]
    entrypoint: ["sleep", "infinity"]
    working_dir: /home/node/projects
    stdin_open: true
    tty: true

    volumes:
      # Init scripts — read-write (agents can generate new ones)
      - ${ARCANE}/vibespace/init.d:/home/node/init.d

      # Dotfiles — mapped directly into home, editable
      - ${ARCANE}/vibespace/dotfiles/.bashrc:/home/node/.bashrc
      - ${ARCANE}/vibespace/dotfiles/.bashrc.d:/home/node/.bashrc.d
      - ${ARCANE}/vibespace/dotfiles/.gitconfig:/home/node/.gitconfig

      # Skills — versionado com arcane
      - ${ARCANE}/vibespace/skills:/home/node/skills

      # Projects — host bind mount
      - ${PROJECT_PATH}:/home/node/projects

      # Agent configs (.claude/, etc.) — persists outside named volume
      - ${ARCANE}/vibespace/.data/agents:/home/node/.agents

      # SSH keys — persists outside named volume
      - ${ARCANE}/vibespace/.data/ssh:/home/node/.ssh

      # Persistent home (catch-all for everything else)
      - vibestorage:/home/node

    ports:
      - "${SSH_PORT:-2222}:22"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - lilith_default

volumes:
  vibestorage:

networks:
  lilith_default:
    name: lilith_default
    external: true
